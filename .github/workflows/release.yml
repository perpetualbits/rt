name: release

# Build distro packages on every version tag and attach them to that tag's
# GitHub Release, so people can grab a .deb / .rpm / .pkg.tar.zst and run rt
# without a Rust toolchain.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # upload assets to the Release

jobs:
  packages:
    name: deb/rpm/arch (x86_64 + aarch64 + riscv64)
    runs-on: ubuntu-24.04
    env:
      # Cap the glibc version each binary needs, so the packages run on older
      # distros (Debian bookworm 2.36, Ubuntu 22.04 2.35, …) and not only on the
      # build host's glibc. rt dlopens the GUI/GL/font libraries (they're never
      # hard-linked — only libc/libm/libgcc_s are), so cross-building needs no
      # target sysroot: cargo-zigbuild + zig cross-compile every arch right here.
      ZIG_VERSION: "0.14.1"
    steps:
      - uses: actions/checkout@v4

      # Host dev libraries satisfy build-script pkg-config; the libraries
      # themselves are dlopened at runtime (declared as package deps), not linked.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libxcb1-dev libx11-dev \
            libgl1-mesa-dev libfontconfig1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu, riscv64gc-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2

      - name: Install zig + cargo-zigbuild
        run: |
          curl -sSfL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" | sudo tar -xJ -C /opt
          echo "/opt/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
          cargo install cargo-zigbuild --locked

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build + package every arch
        run: |
          set -euo pipefail
          export PKG_VERSION="${GITHUB_REF_NAME#v}" # tag v0.2.6 -> 0.2.6
          export PATH="$PATH:$(go env GOPATH)/bin"
          mkdir -p dist target/release

          # zig-target (with glibc floor) : rustc target dir : nfpm arch
          build() {
            local zt="$1" dir="$2" arch="$3"
            echo "=== building $arch ($zt) ==="
            cargo zigbuild --release -p rt --locked --target "$zt"
            cp "target/$dir/release/rt" target/release/rt # where nfpm.yaml looks
            for pkgr in deb rpm archlinux; do
              PKG_ARCH="$arch" nfpm package --config packaging/nfpm.yaml --packager "$pkgr" --target dist/
            done
          }
          build x86_64-unknown-linux-gnu.2.28    x86_64-unknown-linux-gnu    amd64
          build aarch64-unknown-linux-gnu.2.28   aarch64-unknown-linux-gnu   arm64
          build riscv64gc-unknown-linux-gnu.2.35 riscv64gc-unknown-linux-gnu riscv64
          echo "built:"; ls -l dist

      - name: Attach packages to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  snap:
    name: ${{ matrix.arch }} snap
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # A snap ships its own base runtime, so it isn't affected by the host
          # glibc; snapcraft has no riscv64 target, so the snap column is amd64 + arm64.
          - { runner: ubuntu-24.04, arch: amd64 }
          - { runner: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      # The official action provisions LXD and runs snapcraft from snap/snapcraft.yaml.
      - uses: snapcore/action-build@v1
        id: build

      - name: Attach snap to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.snap }}
          fail_on_unmatched_files: true
